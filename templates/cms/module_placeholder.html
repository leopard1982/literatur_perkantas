{% extends 'cms/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block extra_styles %}
<style>
    .page-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
    }

    .back-link {
        display: inline-flex;
        text-decoration: none;
        color: #bf5b3d;
        font-weight: 800;
    }

    .panel {
        padding: 28px;
    }

    .bullet {
        padding: 16px 18px;
        border-radius: 18px;
        background: white;
        border: 1px solid rgba(219, 205, 189, 0.9);
        margin-top: 12px;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-top">
    <a class="back-link" href="/cms/">Kembali ke CMS</a>
</div>
<section class="panel surface-card">
    <h1 class="fw-bold mb-2">{{ title }}</h1>
    <p class="text-secondary mb-4">{{ description }}</p>
    {% for bullet in bullets %}
    <div class="bullet">{{ bullet }}</div>
    {% endfor %}
</section>
{% endblock %}
